<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">
  <rect width="1400" height="720" fill="#13120f"/>
  <text x="48" y="58" fill="#f2dfb8" font-family="Arial, sans-serif" font-size="30">v0.1.34 Integration Contact Sheet</text>
  <text x="48" y="92" fill="#b7aa92" font-family="Arial, sans-serif" font-size="16">Recommended main-lane order: import all, integrate pistol, integrate scattergun display, integrate ammo family, integrate route-console prop polish.</text>
  <g font-family="Arial, sans-serif" font-size="18">
    <g transform="translate(70 150)">
      <rect width="260" height="390" rx="6" fill="#1d1b17" stroke="#6d6049"/>
      <text x="24" y="42" fill="#eadbbf">1. Pressure Pistol</text>
      <text x="24" y="82" fill="#b7aa92">First-person readability.</text>
      <text x="24" y="124" fill="#b7aa92">Chamber, coil, gauge,</text>
      <text x="24" y="154" fill="#b7aa92">lever, grip contrast.</text>
      <rect x="48" y="220" width="142" height="44" fill="#0e0d0c"/>
      <rect x="98" y="190" width="128" height="34" fill="#ad782b"/>
      <rect x="58" y="267" width="54" height="88" fill="#401f0d"/>
    </g>
    <g transform="translate(390 150)">
      <rect width="260" height="390" rx="6" fill="#1d1b17" stroke="#6d6049"/>
      <text x="24" y="42" fill="#eadbbf">2. Scattergun Display</text>
      <text x="24" y="82" fill="#b7aa92">World pickup mass.</text>
      <text x="24" y="124" fill="#b7aa92">Yoke, barrels, shell</text>
      <text x="24" y="154" fill="#b7aa92">rack, slug canister.</text>
      <rect x="44" y="315" width="170" height="30" fill="#0e0d0c"/>
      <rect x="60" y="220" width="150" height="20" fill="#403831"/>
      <rect x="60" y="250" width="150" height="20" fill="#403831"/>
      <rect x="75" y="190" width="125" height="20" fill="#ad782b"/>
    </g>
    <g transform="translate(710 150)">
      <rect width="260" height="390" rx="6" fill="#1d1b17" stroke="#6d6049"/>
      <text x="24" y="42" fill="#eadbbf">3. Ammo Family</text>
      <text x="24" y="82" fill="#b7aa92">Pressure-cell variants.</text>
      <text x="24" y="124" fill="#b7aa92">Red seals should read</text>
      <text x="24" y="154" fill="#b7aa92">before HUD feedback.</text>
      <rect x="60" y="310" width="140" height="28" fill="#0e0d0c"/>
      <rect x="76" y="205" width="30" height="110" fill="#ad782b"/>
      <rect x="115" y="195" width="30" height="120" fill="#ad782b"/>
      <rect x="154" y="205" width="30" height="110" fill="#ad782b"/>
      <rect x="70" y="255" width="120" height="12" fill="#b30f09"/>
    </g>
    <g transform="translate(1030 150)">
      <rect width="260" height="390" rx="6" fill="#1d1b17" stroke="#6d6049"/>
      <text x="24" y="42" fill="#eadbbf">4. Route Consoles</text>
      <text x="24" y="82" fill="#b7aa92">Visual dressing last.</text>
      <text x="24" y="124" fill="#b7aa92">No prompts, no puzzle</text>
      <text x="24" y="154" fill="#b7aa92">state, no triggers.</text>
      <rect x="66" y="190" width="128" height="140" fill="#0e0d0c"/>
      <rect x="90" y="230" width="80" height="16" fill="#ad782b"/>
      <rect x="90" y="285" width="80" height="16" fill="#ad782b"/>
      <rect x="82" y="205" width="36" height="36" fill="#e6cf96"/>
      <rect x="142" y="205" width="36" height="36" fill="#e6cf96"/>
    </g>
  </g>
  <path d="M342 345 L378 345" stroke="#e8b34d" stroke-width="4"/>
  <path d="M662 345 L698 345" stroke="#e8b34d" stroke-width="4"/>
  <path d="M982 345 L1018 345" stroke="#e8b34d" stroke-width="4"/>
</svg>
